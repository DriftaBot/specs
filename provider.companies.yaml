companies:
  - name: stripe
    display_name: Stripe
    specs:
      - type: openapi
        repo: stripe/openapi
        path: openapi/spec3.json
        output: companies/providers/stripe/openapi/stripe.openapi.json
    consumers:
      - query: "stripe language:python"
      - query: "from stripe import language:python"
      - query: "require(\"stripe\") language:javascript"
      - query: "from 'stripe' language:typescript"
      - query: "github.com/stripe/stripe-go language:go"
      - query: "Stripe::StripeClient language:ruby"

  - name: twilio
    display_name: Twilio
    specs:
      - type: openapi
        repo: twilio/twilio-oai
        # Fetch all JSON spec files in the directory
        path_pattern: spec/json
        output_dir: companies/providers/twilio/openapi/
    consumers:
      - query: "twilio language:python"
      - query: "from twilio.rest import language:python"
      - query: "require(\"twilio\") language:javascript"
      - query: "github.com/twilio/twilio-go language:go"
      - query: "Twilio::REST language:ruby"

  - name: github
    display_name: GitHub
    specs:
      - type: openapi
        repo: github/rest-api-description
        path: descriptions/api.github.com/api.github.com.json
        output: companies/providers/github/openapi/github.openapi.json
    consumers:
      - query: "from github import Github language:python"
      - query: "PyGithub language:python"
      - query: "require(\"@octokit/rest\") language:javascript"
      - query: "from '@octokit/rest' language:typescript"
      - query: "github.com/google/go-github language:go"

  - name: slack
    display_name: Slack
    specs:
      - type: openapi
        repo: slackapi/slack-api-specs
        path: web-api/slack_web_openapi_v2.json
        output: companies/providers/slack/openapi/slack.openapi.json
    consumers:
      - query: "from slack_sdk import language:python"
      - query: "slack_sdk language:python"
      - query: "require(\"@slack/web-api\") language:javascript"
      - query: "from '@slack/web-api' language:typescript"
      - query: "github.com/slack-go/slack language:go"

  - name: sendgrid
    display_name: SendGrid
    specs:
      - type: openapi
        repo: twilio/sendgrid-oai
        path_pattern: spec/json
        output_dir: companies/providers/sendgrid/openapi/
    consumers:
      - query: "sendgrid language:python"
      - query: "from sendgrid import language:python"
      - query: "require(\"@sendgrid/mail\") language:javascript"
      - query: "from '@sendgrid/mail' language:typescript"
      - query: "github.com/sendgrid/sendgrid-go language:go"

  - name: digitalocean
    display_name: DigitalOcean
    specs:
      - type: openapi
        repo: digitalocean/openapi
        path: specification/DigitalOcean-public.v2.yaml
        output: companies/providers/digitalocean/openapi/digitalocean.openapi.yaml
    consumers:
      - query: "python-digitalocean language:python"
      - query: "import digitalocean language:python"
      - query: "require(\"do-wrapper\") language:javascript"
      - query: "github.com/digitalocean/godo language:go"

  - name: netlify
    display_name: Netlify
    specs:
      - type: openapi
        repo: netlify/open-api
        path: swagger.yml
        output: companies/providers/netlify/openapi/netlify.openapi.yaml
    consumers:
      - query: "netlify-cli language:javascript"
      - query: "require(\"netlify\") language:javascript"
      - query: "from netlify import language:python"
      - query: "github.com/netlify/open-api language:go"

  - name: pagerduty
    display_name: PagerDuty
    specs:
      - type: openapi
        repo: PagerDuty/api-schema
        path: REST/openapiv3.json
        output: companies/providers/pagerduty/openapi/pagerduty.openapi.json
    consumers:
      - query: "pdpyras language:python"
      - query: "from pdpyras import language:python"
      - query: "require(\"node-pagerduty\") language:javascript"
      - query: "github.com/PagerDuty/go-pagerduty language:go"

  - name: shopify
    display_name: Shopify
    specs:
      - type: graphql
        repo: Shopify/graphql-design-tutorial
        # NOTE: Shopify's production GraphQL SDL is not publicly committed to GitHub.
        # This entry is a placeholder; update path once a canonical SDL source is confirmed.
        path: README.md
        output: companies/providers/shopify/graphql/.keep
    consumers:
      - query: "shopify language:python"
      - query: "from shopify import language:python"
      - query: "require(\"shopify-api-node\") language:javascript"
      - query: "github.com/bold-commerce/go-shopify language:go"

  - name: google
    display_name: Google
    specs:
      - type: grpc
        repo: googleapis/googleapis
        # Fetch all proto files for the Pub/Sub v1 API as an example
        path_pattern: google/pubsub/v1
        output_dir: companies/providers/google/grpc/pubsub_v1/
    consumers:
      - query: "google-cloud-pubsub language:python"
      - query: "from google.cloud import pubsub language:python"
      - query: "require(\"@google-cloud/pubsub\") language:javascript"
      - query: "cloud.google.com/go/pubsub language:go"
