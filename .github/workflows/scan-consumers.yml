name: Scan Consumers

on:
  schedule:
    - cron: '0 4 * * 3'   # Weekly on Wednesday at 04:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -e .

      - name: Scan registered consumers
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DRIFTABOT_TOKEN: ${{ secrets.DRIFTABOT_TOKEN }}
        run: python -m notifier scan

      - name: Commit scan results
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name  "driftabot-crawler[bot]"
          git config user.email "crawler@driftabot.dev"
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/DriftaBot/registry.git"
          git add companies/consumers/
          git diff --cached --quiet && echo "No scan results to commit." || \
            git commit -m "chore: update consumer scan results [skip ci]" && git pull --rebase && git push
