name: Discover New Providers

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  discover:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install Python dependencies
        run: pip install -e .

      - name: Run provider discoverer
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python -m discoverer

      - name: Commit discovery results
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name  "driftabot-crawler[bot]"
          git config user.email "crawler@driftabot.dev"
          git remote set-url origin \
            "https://x-access-token:${GITHUB_TOKEN}@github.com/DriftaBot/registry.git"
          git add companies/providers/ provider.companies.yaml
          git diff --cached --quiet && echo "No changes to commit." || \
            git commit -m "chore: discover and register new API providers [skip ci]" \
            && git pull --rebase && git push
