name: Discover Consumers

on:
  schedule:
    - cron: '0 2 * * 1'   # Weekly on Monday at 02:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  discover:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -e .

      - name: Discover new consumers
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DRIFTABOT_TOKEN: ${{ secrets.DRIFTABOT_TOKEN }}
        run: python -m notifier discover

      - name: Commit discovered consumers and issue logs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name  "driftabot-crawler[bot]"
          git config user.email "crawler@driftabot.dev"
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/DriftaBot/registry.git"
          if [ -d companies/consumers/ ]; then git add companies/consumers/; fi
          git add consumer.companies.yaml
          git diff --cached --quiet && echo "No changes." || \
            git commit -m "chore: register discovered consumers [skip ci]" && git pull --rebase && git push
