name: Crawl API Specs

on:
  workflow_dispatch:

permissions:
  contents: write             # required to push spec updates back to the repo

jobs:
  crawl:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -e .

      - name: Run crawler
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python -m crawler

      - name: Commit updated specs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "driftabot-crawler[bot]"
          git config user.email "crawler@driftabot.dev"
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/DriftaBot/registry.git"
          git add companies/providers/
          if git diff --staged --quiet; then
            echo "No spec changes."
          else
            git commit -m "chore: update provider specs $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git pull --rebase
            git push
          fi
