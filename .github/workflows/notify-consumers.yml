name: Notify API Consumers

on:
  workflow_dispatch:

permissions:
  contents: write          # write consumer issue logs back to repo

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install Python dependencies
        run: pip install -e .

      - name: Run consumer notifier
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DRIFTABOT_TOKEN: ${{ secrets.DRIFTABOT_TOKEN }}
        run: python -m notifier

      - name: Commit consumer issue logs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name  "driftabot-crawler[bot]"
          git config user.email "crawler@driftabot.dev"
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/DriftaBot/registry.git"
          if [ -d companies/consumers/ ]; then git add companies/consumers/; fi
          git add consumer.companies.yaml
          git diff --cached --quiet && echo "No issue logs to commit." || \
            git commit -m "chore: log consumer issue notifications [skip ci]" && git pull --rebase && git push
