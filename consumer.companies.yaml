# Opt-in consumer registry for DriftaBot breaking change notifications.
#
# To register your repo: open a PR adding an entry below.
# You will receive a GitHub issue whenever a breaking change is detected
# in any of the listed companies' APIs.
#
# Format:
#   - repo: owner/repo-name          # required
#     companies:                     # required — list of company names from companies.yaml
#       - stripe
#       - twilio
#     contact: team@example.com      # optional

consumers:
  - repo: spree/spree_stripe
    companies:
      - stripe

  - repo: ansible-collections/community.general
    companies:
      - sendgrid

  - repo: auth0/rules
    companies:
      - sendgrid

  - repo: kaansoral/adventureland
    companies:
      - stripe
